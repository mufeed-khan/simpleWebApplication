<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gird layout</title>

    <style>
      .main {
        display: grid;

        grid-template-rows: 200px;
        /* background-color: red; */
        grid-gap: 10px;
        padding: 20px;
        box-shadow: 8px 12px 15px blue;
        border-radius: 12px;
      }
      .num {
        /* background-color: lightgrey;  */
        text-align: center;
        padding: 60px;
        font-size: 30px;
        text-shadow: 5px 12px 15px;
      }
    </style>
  </head>
  <body>

    
    
    <div class="main" >
      <div class="num">MUFEED KHAN</div>
    </div>

    
    
  </body>
</html>
